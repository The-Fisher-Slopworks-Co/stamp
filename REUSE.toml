version = 1

# Files that cannot carry an inline SPDX header (JSON has no comment syntax,
# icon.png is binary) or are kept comment-free on purpose (docs, dotfiles).
# Source code (*.ts, *.mjs) and the workflow YAML carry headers inline instead.

[[annotations]]
path = [
    "README.md",
    "CHANGELOG.md",
    "CLAUDE.md",
    "CONTRIBUTING.md",
    "SECURITY.md",
    ".github/ISSUE_TEMPLATE/bug_report.md",
    ".github/ISSUE_TEMPLATE/feature_request.md",
    ".github/PULL_REQUEST_TEMPLATE.md",
    "LICENSE.md",
    "package.json",
    "package-lock.json",
    "tsconfig.json",
    ".gitignore",
    ".vscodeignore",
    ".vscode/launch.json",
    ".vscode/tasks.json",
    ".claude/settings.json",
    "icon.png",
]
SPDX-FileCopyrightText = "2026 Stamp contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# CODE_OF_CONDUCT.md is the verbatim Contributor Covenant v2.1, which its authors
# publish under CC-BY-4.0 — so it keeps its upstream license, not the project's.
[[annotations]]
path = "CODE_OF_CONDUCT.md"
SPDX-FileCopyrightText = "2014 Coraline Ada Ehmke and the Contributor Covenant contributors"
SPDX-License-Identifier = "CC-BY-4.0"
